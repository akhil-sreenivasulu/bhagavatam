<!doctype html>
<html lang="te">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>పోతన భాగవతం</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="reader-body" data-language="te">
    <div class="page-shell">
      <aside class="sidebar" id="sidebar"></aside>

      <main class="main-panel">
        <section class="top-strip">
          <button class="secondary-link button-link" id="sidebarToggle" type="button">భాగాలు</button>
          <a class="secondary-link" href="index.html">ముఖ్య పుట</a>
          <a class="secondary-link" href="english.html">English</a>
        </section>

        <section class="control-bar">
          <div class="verse-rail" id="verseNav"></div>
          <div class="chapter-rail" id="chapterNav"></div>
        </section>

        <article class="shloka-card">
          <div class="verse-header">
            <div>
              <p class="eyebrow" id="verseLocation">పద్యము</p>
              <h1 id="chapterTitle">లోడవుతోంది...</h1>
            </div>
            <div class="jump-actions">
              <button id="prevVerse" type="button">మునుపటి</button>
              <button id="nextVerse" type="button">తర్వాతి</button>
            </div>
          </div>

          <p class="chapter-summary" id="chapterSummary"></p>
          <div class="chapter-meta" id="chapterMeta"></div>

          <div class="shloka-text" id="verseText"></div>
          <div class="transliteration" id="transliteration"></div>

          <div class="meaning-block">
            <h2 id="meaningHeading">భావము</h2>
            <p id="verseMeaning"></p>
          </div>

          <details class="word-meanings">
            <summary id="wordMeaningLabel">గమనిక</summary>
            <p id="wordMeanings"></p>
          </details>
        </article>

        <section class="dropdown-nav-card">
          <div class="section-head">
            <div>
              <p class="eyebrow" id="dropdownEyebrow">త్వరిత నావిగేషన్</p>
              <h2 id="dropdownHeading">స్కంధము, అధ్యాయం, పద్యము ఎంచుకోండి</h2>
            </div>
          </div>
          <div class="dropdown-nav triple-nav">
            <label class="dropdown-field">
              <span id="cantoSelectLabel">స్కంధము</span>
              <select id="cantoSelect"></select>
            </label>
            <label class="dropdown-field">
              <span id="chapterSelectLabel">అధ్యాయం</span>
              <select id="chapterSelect"></select>
            </label>
            <label class="dropdown-field">
              <span id="verseSelectLabel">పద్యము</span>
              <select id="verseSelect"></select>
            </label>
          </div>
        </section>

        <section class="jump-grid-wrap">
          <div class="section-head">
            <div>
              <p class="eyebrow" id="jumpEyebrow">ఏ పద్యానికైనా వెళ్లండి</p>
              <h2 id="jumpHeading">పద్య సూచిక</h2>
            </div>
            <p id="jumpLabel"></p>
          </div>
          <div class="jump-grid" id="jumpGrid"></div>
        </section>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
